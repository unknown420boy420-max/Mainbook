<!DOCTYPE html>
<html>
<head>
  <title>Mini Instagram</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>Mini Instagram 📸</header>

<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>
</div>

<div id="uploadBox" style="display:none;">
  <input type="file" id="file">
  <button onclick="upload()">Upload</button>
</div>

<div id="feed"></div>

<div class="navbar">
  <button onclick="showFeed()">🏠</button>
  <button onclick="showUpload()">➕</button>
  <button onclick="showProfile()">👤</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js"></script>

<script src="app.js"></script>

</body>
</html>
